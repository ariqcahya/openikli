services:
  opensource-ikli-db:
    build:
      context: ./packages/database
      dockerfile: Dockerfile.db
    container_name: opensource-ikli-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ikli
      POSTGRES_USER: ikli
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5454:5432"
    volumes:
      - opensource_ikli_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ikli -d ikli"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensource-ikli-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: opensource-ikli-web
    restart: unless-stopped
    depends_on:
      opensource-ikli-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ikli:${POSTGRES_PASSWORD}@opensource-ikli-db:5432/ikli
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_URL: ${APP_URL}
      NODE_ENV: ${NODE_ENV}
    ports:
      - "3000:3000"

volumes:
  opensource_ikli_postgres_data:
